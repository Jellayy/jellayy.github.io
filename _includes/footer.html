<footer class="footer">
  <div class="container">
    <div class="row">
      <div class="col col-12">
        <div class="footer-top">
          <h2 class="logo-title">
            <a href="{{site.baseurl}}/" class="logo-text">Austin Lynn Huffman</a>
          </h2>
          <div class="top"><i class="ion ion-ios-arrow-up"></i></div>
        </div>
        <div class="footer-bottom">
          <div class="copyright">
            <p>All rights reserved unless specified otherwise</p>
          </div>
          <div class="footer-social">
            <ul class="list-reset">
              {% if site.linkedin %}
              <li><a href="{{ site.linkedin }}">LinkedIn</a></li>
              {% else %} {% endif %}

              {% if site.youtube %}
              <li><a href="{{ site.youtube }}">YouTube</a></li>
              {% else %} {% endif %}
            </ul>
          </div>
        </div>
      </div>
    </div>
  </div>
</footer> <!-- /.footer -->
