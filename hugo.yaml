# Hugo configuration file
title: alhuff.com

# import hextra as module
module:
  imports:
  - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

outputs:
  home:
    - HTML
    - RSS
  section:
    - HTML
    - RSS
  page:
    - HTML

menu:
  main:
    - name: Blog
      pageRef: /blog
      weight: 1
    - name: Photos
      url: "https://photos.alhuff.com"
      weight: 1
    - name: Search
      weight: 4
      params:
        type: search
    - name: GitLab
      weight: 5
      url: "https://gitlab.com/jellayy"
      params:
        icon: gitlab
    - name: GitHub
      weight: 6
      url: "https://github.com/jellayy"
      params:
        icon: github
    - name: YouTube
      weight: 7
      url: "https://www.youtube.com/@alhuff_"
      params:
        icon: youtube

params:
  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    displayCopyright: true
    displayPoweredBy: false

  editURL:
    enable: false

  blog:
    list:
      displayTags: true

  page:
    width: wide

  rss:
    includeContent: false
    limit: 10 # Number of posts to include in the feed

